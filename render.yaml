services:
  - type: web
    name: kuba-web
    runtime: python
    plan: starter
    buildCommand: python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT kuba.asgi:application
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: CONN_MAX_AGE
        value: "600"
      - key: DATABASE_URL
        fromDatabase:
          name: kuba-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: kuba-redis
          type: keyvalue
          property: connectionString
  - type: keyvalue
    name: kuba-redis
    ipAllowList: []
databases:
  - name: kuba-db
    databaseName: kuba
    user: kuba
