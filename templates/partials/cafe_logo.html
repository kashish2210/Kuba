{% comment %}Renders the active cafe's logo: uploaded image > inline SVG > default cup icon.
The surrounding element controls the size; this just fills it.{% endcomment %}
{% if cafe.logo_image %}
    <img src="{{ cafe.logo_image.url }}" alt="{{ cafe.name }} logo" style="max-width:100%;max-height:100%;object-fit:contain;">
{% elif cafe.logo_svg %}
    {{ cafe.logo_svg|safe }}
{% else %}
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
        <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
    </svg>
{% endif %}
