<!doctype html>
<html>
<head><meta charset="utf-8"><title>Receipt {{ order_number }}</title></head>
<body style="margin:0;background:#f0f2f5;font-family:'Segoe UI','Inter',Helvetica,Arial,sans-serif;color:#1e293b;">
<div style="max-width:460px;margin:24px auto;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.10);">

    <div style="background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a855f7 100%);padding:30px 28px;text-align:center;color:#fff;">
        <div style="width:48px;height:48px;margin:0 auto 8px;opacity:.9;">{{ logo }}</div>
        <div style="font-size:1.5rem;font-weight:800;letter-spacing:.02em;">{{ cafe_name }}</div>
        <div style="display:inline-block;margin-top:8px;background:rgba(255,255,255,.2);padding:4px 14px;border-radius:999px;font-size:.78rem;font-weight:600;backdrop-filter:blur(4px);">{{ order_number }}</div>
    </div>

    <div style="padding:24px 28px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
            <div style="background:#f8fafc;border-radius:12px;padding:12px 14px;">
                <div style="font-size:.7rem;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Date</div>
                <div style="font-size:.88rem;font-weight:600;margin-top:3px;">{{ date }}</div>
            </div>
            <div style="background:#f8fafc;border-radius:12px;padding:12px 14px;">
                <div style="font-size:.7rem;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Table</div>
                <div style="font-size:.88rem;font-weight:600;margin-top:3px;">{{ table }}</div>
            </div>
            <div style="background:#f8fafc;border-radius:12px;padding:12px 14px;">
                <div style="font-size:.7rem;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Customer</div>
                <div style="font-size:.88rem;font-weight:600;margin-top:3px;">{{ customer_name }}</div>
            </div>
            <div style="background:#f8fafc;border-radius:12px;padding:12px 14px;">
                <div style="font-size:.7rem;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.05em;">Payment</div>
                <div style="font-size:.88rem;font-weight:600;margin-top:3px;">{{ payment_method }}</div>
            </div>
        </div>

        <div style="background:#f8fafc;border-radius:14px;padding:16px;margin-bottom:20px;">
            {{ items_table }}
        </div>

        <div style="background:linear-gradient(135deg,#faf5ff,#eef2ff);border-radius:14px;padding:18px;">
            <table style="width:100%;font-size:14px;border-collapse:collapse;">
                <tr><td style="padding:4px 0;color:#64748b;">Subtotal</td><td style="text-align:right;padding:4px 0;">{{ subtotal }}</td></tr>
                <tr><td style="padding:4px 0;color:#64748b;">Tax (GST)</td><td style="text-align:right;padding:4px 0;">{{ tax }}</td></tr>
                <tr><td style="padding:4px 0;color:#64748b;">Discount</td><td style="text-align:right;padding:4px 0;">−{{ discount }}</td></tr>
                <tr><td style="padding:12px 0 0;font-weight:800;font-size:1.3rem;border-top:2px solid #e2e8f0;">Total</td>
                    <td style="text-align:right;padding:12px 0 0;font-weight:800;font-size:1.3rem;border-top:2px solid #e2e8f0;color:#7c3aed;">{{ total }}</td></tr>
            </table>
        </div>
    </div>

    <div style="padding:24px 28px;text-align:center;border-top:1px solid #f1f5f9;">
        <div style="font-size:13px;color:#94a3b8;margin-bottom:14px;">Enjoyed your experience?</div>
        <a href="{{ review_url }}" style="display:inline-block;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;text-decoration:none;font-weight:700;padding:12px 26px;border-radius:12px;font-size:13px;box-shadow:0 4px 14px rgba(99,102,241,.3);">Leave a Review ★</a>
        <div style="font-size:10px;color:#cbd5e1;margin-top:16px;letter-spacing:.06em;">Powered by Kuba</div>
    </div>
</div>
</body>
</html>
